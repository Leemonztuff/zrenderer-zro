version: '3.8'

services:
  zrenderer:
    build: .
    ports:
      - "11011:11011"
    volumes:
      - ./zrenderer.docker.conf:/zren/zrenderer.conf
      - ./output:/zren/output
      - ./resources:/zren/resources
    restart: always

  # Aplicación de juego (React + Node.js)
  game-app:
    build: ./examples/rpg-tactic-template/server
    ports:
      - "3001:3001"
      - "3000:3000"
    environment:
      - ZRENDERER_URL=http://zrenderer:11011
      - SUPABASE_URL=your-supabase-url
      - SUPABASE_KEY=your-supabase-anon-key
    volumes:
      - ./integration:/app/integration
    depends_on:
      - zrenderer
