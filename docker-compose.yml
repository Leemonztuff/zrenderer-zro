version: '3.8'

services:
  zrenderer:
    build: .
    ports:
      - "11011:11011"
    volumes:
      - ./zrenderer.docker.conf:/zren/zrenderer.conf
      - ./output:/zren/output
      - ./resources:/zren/resources
    restart: always

  # Servicio de ejemplo para tu aplicación de juego basada en el template
  game-app:
    build: ./examples/rpg-tactic-template/server
    ports:
      - "3001:3001"
    environment:
      - ZRENDERER_URL=http://zrenderer:11011
      - ZRENDERER_TOKEN=test-token
      - SUPABASE_URL=your-supabase-url
      - SUPABASE_KEY=your-supabase-anon-key
    depends_on:
      - zrenderer
