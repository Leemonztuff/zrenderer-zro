version: '3.8'

services:
  zrenderer:
    build: .
    ports:
      - "11011:11011"
    volumes:
      - ./zrenderer.docker.conf:/zren/zrenderer.conf
      - ./output:/zren/output
      - ./resources:/zren/resources
    restart: always

  # Plantilla para tu aplicación de juego
  game-app:
    build:
      context: .
      dockerfile: ./examples/rpg-tactic-template/server/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./integration:/app/integration
      - ./examples/rpg-tactic-template/server:/app/server
    working_dir: /app/server
    environment:
      - ZRENDERER_URL=http://zrenderer:11011
      - SUPABASE_URL=your-supabase-url
      - SUPABASE_KEY=your-supabase-anon-key
    depends_on:
      - zrenderer
