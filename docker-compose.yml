version: '3.8'

services:
  zrenderer:
    build: .
    ports:
      - "11011:11011"
    volumes:
      - ./zrenderer.docker.conf:/zren/zrenderer.conf
      - ./output:/zren/output
      - ./resources:/zren/resources
    restart: always

  # Backend para el juego RPG Táctico
  game-app:
    build:
      context: .
      dockerfile: ./examples/rpg-tactic-template/server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - ZRENDERER_URL=http://zrenderer:11011
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - ZRENDERER_TOKEN=${ZRENDERER_TOKEN}
    volumes:
      - ./integration:/app/integration
      - ./examples/rpg-tactic-template/server:/app/server
    depends_on:
      - zrenderer
