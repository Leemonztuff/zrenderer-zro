version: '3.8'

services:
  zrenderer:
    build: .
    image: zhade/zrenderer:latest
    ports:
      - "11011:11011"
    volumes:
      - ./zrenderer.docker.conf:/zren/zrenderer.conf
      - ./output:/zren/output
      - ./resources:/zren/resources
    restart: unless-stopped

