version: '3.8'

services:
  zrenderer:
    build: .
    ports:
      - "11011:11011"
    volumes:
      - ./zrenderer.docker.conf:/zren/zrenderer.conf
      - ./output:/zren/output
      - ./resources:/zren/resources
    restart: always

  # Aplicación de ejemplo de RPG Táctico
  game-app:
    build: ./examples/rpg-tactic-template/server
    ports:
      - "3001:3001"
    volumes:
      - ./integration:/app/integration
    environment:
      - ZRENDERER_URL=http://zrenderer:11011
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL:-https://your-project.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-your-anon-key}
      - ZRENDERER_TOKEN=${ZRENDERER_TOKEN}
    depends_on:
      - zrenderer
